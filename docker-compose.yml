services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '3000:80'
    restart: unless-stopped
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assetflow}
      POSTGRES_USER: ${POSTGRES_USER:-assetflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assetflow}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-assetflow} -d ${POSTGRES_DB:-assetflow}']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: '3333'
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-assetflow}:${POSTGRES_PASSWORD:-assetflow}@db:5432/${POSTGRES_DB:-assetflow}?schema=public'
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000/api}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-.env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-http://localhost:3000/reset-password}
      MAIL_FROM: ${MAIL_FROM:-no-reply@assetflow.local}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-true}
      RUN_SEED: ${RUN_SEED:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3333/ | grep -q Healthy']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3000'
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:3000/api}
      NUXT_API_BASE_SERVER: ${NUXT_API_BASE_SERVER:-http://api:3333}
      NUXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NUXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
      NUXT_PUBLIC_GITHUB_AUTH_ENABLED: ${NUXT_PUBLIC_GITHUB_AUTH_ENABLED:-false}
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:3000/login']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - /pgadmin-entrypoint.sh
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-assetflow@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-assetflow}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_SERVER_JSON_FILE: /tmp/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: 'True'
      POSTGRES_DB: ${POSTGRES_DB:-assetflow}
      POSTGRES_USER: ${POSTGRES_USER:-assetflow}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    restart: unless-stopped
    volumes:
      - ./scripts/docker/pgadmin-entrypoint.sh:/pgadmin-entrypoint.sh:ro

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '8025:8025'
      - '1025:1025'

volumes:
  postgres_data:

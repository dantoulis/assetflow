name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install pinned Yarn via Corepack
        run: corepack install

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Generate Prisma client
        run: corepack yarn workspace api prisma:generate

      - name: Check formatting
        run: corepack yarn format:check

      - name: Lint
        run: corepack yarn lint

      - name: Typecheck
        run: corepack yarn typecheck

      - name: Build API
        run: corepack yarn build:api

      - name: Build web app
        run: corepack yarn build:web
